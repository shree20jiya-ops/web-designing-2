<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h2>Employees salary management system</h2>
        <input class="input" type="text" id="name" placeholder="Employee Name"><br>
        <input class="input" type="text" id="empid" placeholder="Employee id"><br>
        <input class="input" type="number" id="salary" placeholder="Employee salary"><br>
        <input class="input" type="text" id="dept" placeholder="Employee department"><br>

        <button class="button" onclick="addEmployee()">Add Employee</button>
        <button class="button" onclick="displayEmployee()">Display All</button>
        <button class="button" onclick="filterSalary()">Salary >50000</button>
        <button class="button" onclick="totalSalary()">Total salary</button>
        <button class="button" onclick="averageSalary()">Average salary</button>
        <button class="button" onclick="countDepartment()">count by department</button>
        <div id="output"></div>
    </div>
    <script src="index.js"></script>
</body>
</html>
