<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h2 id="mainHeading">Welcome to JavaScript</h2>
        <input class="input" type="text" id="userinput" placeholder="enter new heading text">
        <br><br>
        <button class="btn" id="changetextbtn">Change Heading</button>
        <button class="btn" id="bgcolorbtn">Change Background color</button>
        <button class="btn" id="fontsizebtn">Increase font size</button>
        <button class="btn" id="togglebtn">Show/Hide Paragraph</button>
        <button class="btn" id="resetbtn">Reset</button>
        <p id="paragraph">
            This is a sample  paragraph. JavaScript events can dynamically change content.
        </p>
        
    </div>
    <script src="intex.js"></script>
    
</body>
</html>
