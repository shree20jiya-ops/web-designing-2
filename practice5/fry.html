<!DOCTYPE html>
<html>
<head>
    <title>Employee Salary Management</title>
    <link rel="stylesheet" href="try5.css">
</head>

<body>

<div class="container">
    <h1>Employee Salary Management System</h1>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="number" id="id" placeholder="Enter ID">
    <input type="number" id="salary" placeholder="Enter Salary">
    <input type="text" id="dept" placeholder="Enter Department">

    <br><br>

    <button onclick="addEmployee()">Add Employee</button>
    <button onclick="displayAll()">Display All</button>
    <button onclick="highSalary()">Salary > 50000</button>
    <button onclick="totalSalary()">Total Salary</button>
    <button onclick="averageSalary()">Average Salary</button>
    <button onclick="countDept()">Count by Department</button>

    <p id="output"></p>
</div>

<script src="fry.js"></script>

</body>
</html>
