<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Events</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1 id="heading">Welcome</h1>

    <input type="text" id="text" placeholder="Enter new heading">

    <br><br>

    <button onclick="changeHeading()">Change Heading</button>
    <button onclick="changeBg()">Change Background</button>
    <button onclick="increaseFont()">Increase Font</button>
    <button onclick="togglePara()">Show/Hide Paragraph</button>

    <p id="para">This is a sample paragraph.</p>
</div>

<script src="script.js"></script>

</body>
</html>
